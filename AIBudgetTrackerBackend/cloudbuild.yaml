# Cloud Build: run from monorepo root with Docker context = AIBudgetTrackerBackend/
# Trigger should use build config path: AIBudgetTrackerBackend/cloudbuild.yaml
# and included_files: AIBudgetTrackerBackend/** so Kotlin-only commits do not run this build.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/aibudget-backend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/aibudget-backend:latest
      - AIBudgetTrackerBackend

images:
  - gcr.io/$PROJECT_ID/aibudget-backend:$SHORT_SHA
  - gcr.io/$PROJECT_ID/aibudget-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
