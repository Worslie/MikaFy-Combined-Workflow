# Backend Docker image from monorepo root.
#
# Artifact Registry (Docker):
#   europe-west2-docker.pkg.dev/$PROJECT_ID/REPO/IMAGE:tag
#   REPO=aibudgettrackerbackend, IMAGE=aibudgettrackerbackend
# Region must match the repository region. IAM: Cloud Build SA → Artifact Registry Writer
#
# Trigger: included_files AIBudgetTrackerBackend/** keeps Kotlin-only pushes out.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west2-docker.pkg.dev/$PROJECT_ID/aibudgettrackerbackend/aibudgettrackerbackend:$SHORT_SHA
      - -t
      - europe-west2-docker.pkg.dev/$PROJECT_ID/aibudgettrackerbackend/aibudgettrackerbackend:latest
      - AIBudgetTrackerBackend

images:
  - europe-west2-docker.pkg.dev/$PROJECT_ID/aibudgettrackerbackend/aibudgettrackerbackend:$SHORT_SHA
  - europe-west2-docker.pkg.dev/$PROJECT_ID/aibudgettrackerbackend/aibudgettrackerbackend:latest

options:
  logging: CLOUD_LOGGING_ONLY
