# Backend Docker image from monorepo root.
#
# Image URL shape:
#   ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:TAG
#
# Defaults match Cloud Run’s managed Artifact Registry repo in europe-west2:
#   Repository ID: cloud-run-source-deploy
#   Image name:    aibudget-backend  (align with your Cloud Run service if different)
#
# IAM: whichever account runs the build needs roles/artifactregistry.writer on this repo
# (often PROJECT_NUMBER@cloudbuild.gserviceaccount.com, or your trigger’s custom SA).
#
# Override _AR_* in the Cloud Build trigger if your AR layout differs.
#
# Trigger: included_files AIBudgetTrackerBackend/** keeps Kotlin-only pushes out.

substitutions:
  _AR_LOCATION: europe-west2
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_IMAGE_NAME: aibudget-backend

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:latest
      - AIBudgetTrackerBackend

images:
  - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:$SHORT_SHA
  - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
