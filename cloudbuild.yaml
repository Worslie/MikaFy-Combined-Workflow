# Backend Docker image from monorepo root. Many Cloud Build triggers look for
# cloudbuild.yaml at the repository root (default path).
#
# Trigger tips:
# - included_files: AIBudgetTrackerBackend/**  → Kotlin-only commits skip this build
# - Docker context directory: AIBudgetTrackerBackend/
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/aibudget-backend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/aibudget-backend:latest
      - AIBudgetTrackerBackend

images:
  - gcr.io/$PROJECT_ID/aibudget-backend:$SHORT_SHA
  - gcr.io/$PROJECT_ID/aibudget-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
