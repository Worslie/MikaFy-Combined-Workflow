# Backend: build → push to Artifact Registry → deploy Cloud Run (same build).
#
# Image URL:
#   ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:TAG
# Example (this project):
#   europe-west2-docker.pkg.dev/project-de78e93f-2f10-4495-9bb/cloud-run-source-deploy/aibudget-backend:$SHORT_SHA
#
# We use explicit `docker push` steps before `gcloud run deploy` because the
# `images:` field is pushed only after all steps finish, which would be too late
# for deploy to pull the new image.
#
# IAM (build service account — trigger default or custom):
#   - roles/artifactregistry.writer  (push images)
#   - roles/run.admin                (deploy Cloud Run)
#   - roles/iam.serviceAccountUser   (on the Cloud Run runtime SA if deploy uses it)
#
# Override _AR_* / _RUN_SERVICE in the Cloud Build trigger if needed.
#
# Trigger: included_files AIBudgetTrackerBackend/** keeps Kotlin-only pushes out.

substitutions:
  _AR_LOCATION: europe-west2
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_IMAGE_NAME: aibudget-backend
  _RUN_SERVICE: aibudgettrackerbackend

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:latest
      - AIBudgetTrackerBackend

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:$SHORT_SHA
    waitFor:
      - build

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:latest
    waitFor:
      - build

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_RUN_SERVICE}
      - --image=${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_AR_IMAGE_NAME}:$SHORT_SHA
      - --region=${_AR_LOCATION}
      - --quiet
    waitFor:
      - push-sha

options:
  logging: CLOUD_LOGGING_ONLY
